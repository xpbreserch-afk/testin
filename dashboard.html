<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: { primary: '#111827', surface: '#ffffff', background: '#F9FAFB' },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-in-right': 'slideInRight 0.3s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideInRight: { '0%': { transform: 'translateX(100%)', opacity: '0' }, '100%': { transform: 'translateX(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <style>
        * { scroll-behavior: smooth; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #E5E7EB; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #D1D5DB; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .toast-exit { transform: translateX(100%); opacity: 0; transition: all 0.3s ease-in; }
        
        /* Tab transition helper - Strictly controls visibility */
        .tab-content, .profile-tab-content { display: none; }
        .tab-content.active, .profile-tab-content.active { display: block; }

        /* Floating Box Animation */
        @keyframes boxFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .float-box {
            animation: boxFloat 1.5s ease-in-out infinite;
            animation-play-state: paused;
            will-change: transform;
            transition: box-shadow 0.3s ease;
        }
        .float-box:hover {
            animation-play-state: running;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Exam Specific Styles */
        .option-radio:checked + div { border-color: #111827; background-color: #f3f4f6; font-weight: 600; }
        .option-radio:checked + div .radio-inner { background-color: #111827; }
        .hide { display: none !important; }

        /* ═══════════════════════════════════════════════
           MOBILE LAYER — < 768px
           8px grid · touch targets · safe areas
           ═══════════════════════════════════════════════ */
        * { -webkit-tap-highlight-color: transparent; }
        body { padding-bottom: env(safe-area-inset-bottom); }

        /* ── BOTTOM NAV (mobile only) ── */
        #bottom-nav {
            display: none; /* hidden on desktop */
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #fff; border-top: 1px solid #EAECF0; z-index: 40;
            padding-bottom: env(safe-area-inset-bottom);
            box-shadow: 0 -4px 20px rgba(0,0,0,.05);
        }
        @media (max-width: 767px) { #bottom-nav { display: flex; } }

        .bnav-btn {
            flex: 1; display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 6px 4px 8px; gap: 3px;
            border: none; background: none; cursor: pointer;
            color: #9CA3AF; font-size: 10px; font-weight: 500;
            letter-spacing: .01em; min-height: 52px; transition: color .12s;
        }
        .bnav-btn svg { width: 20px; height: 20px; stroke-width: 1.6; }
        .bnav-btn.active { color: #111827; }
        .bnav-btn.active svg { stroke-width: 2.2; }
        .bnav-dot { width: 3px; height: 3px; border-radius: 50%; background: #111827; opacity: 0; transform: scale(0); transition: all .15s; }
        .bnav-btn.active .bnav-dot { opacity: 1; transform: scale(1); }

        /* ── DRAWER (mobile sidebar replacement) ── */
        #mob-overlay { position: fixed; inset: 0; background: rgba(17,24,39,.4); z-index: 45; display: none; opacity: 0; transition: opacity .2s; }
        #mob-overlay.open { display: block; opacity: 1; }
        #mob-drawer { position: fixed; top: 0; left: 0; bottom: 0; width: 272px; background: #fff; z-index: 50; transform: translateX(-100%); transition: transform .26s cubic-bezier(.16,1,.3,1); display: flex; flex-direction: column; border-right: 1px solid #EAECF0; box-shadow: 4px 0 24px rgba(0,0,0,.08); }
        #mob-drawer.open { transform: translateX(0); }

        /* ── MOBILE LAYOUT OVERRIDES ── */
        @media (max-width: 767px) {
            /* Push content above bottom nav */
            #app-container { padding-bottom: calc(68px + env(safe-area-inset-bottom)) !important; }
            /* Hide desktop sidebar */
            #sidebar { display: none !important; }
            /* Header height */
            header { height: 48px !important; padding-left: 14px !important; padding-right: 14px !important; }
            /* Hamburger becomes drawer trigger */
            .mob-menu-btn { display: flex !important; }
            /* Timer badge smaller */
            #global-timer-display { font-size: 11px !important; padding: 3px 9px !important; margin: 0 auto; }
            /* Toast above nav */
            #toast-container { bottom: calc(60px + env(safe-area-inset-bottom) + 6px) !important; left: 12px !important; right: 12px !important; }
            #toast-container > div { width: 100% !important; }
            /* Touch targets */
            button { min-height: 44px; }
            /* Hide desktop progress bar label on tiny screens */
            .nav-progress-wrap { display: none; }
        }
        @media (min-width: 768px) {
            /* On desktop, hamburger is hidden */
            .mob-menu-btn { display: none !important; }
        }

        /* ── MOBILE PAGE CONTENT OVERRIDES ── */
        @media (max-width: 767px) {
            /* Overview layout: stack */
            .overview-2col { flex-direction: column !important; }
            .overview-sidebar-card { position: static !important; width: 100% !important; }
            /* Lesson layout: stack */
            .lesson-2col { flex-direction: column !important; }
            .lesson-module-nav { width: 100% !important; }
            /* Dashboard headers */
            .dash-h1 { font-size: 1.35rem !important; }
            /* Overview h1 */
            .overview-h1 { font-size: 1.4rem !important; }
            /* Profile hero */
            .profile-hero-row { flex-direction: column !important; align-items: center !important; text-align: center !important; }
            /* Cert actions */
            .cert-action-row { flex-direction: column !important; }
            /* Resume card */
            .resume-card-inner { flex-direction: column !important; align-items: flex-start !important; }
            .resume-card-btn { width: 100% !important; }
            /* Module card grids */
            .module-cards-grid { grid-template-columns: 1fr !important; }
            /* Referral row */
            .referral-row { flex-direction: column !important; }
            /* Profile tabs overflow */
            .profile-tabs-row { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            /* Tab row */
            .tab-row-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            /* Exam question text */
            #question-text { font-size: 1.1rem !important; line-height: 1.55 !important; }
            /* Score circle */
            .score-circle-wrap { width: 120px !important; height: 120px !important; }
            #final-score { font-size: 2rem !important; }
            /* Subscription card */
            .subscription-card-inner { flex-direction: column !important; align-items: flex-start !important; }
            /* Stat cards */
            .stat-num-big { font-size: 2rem !important; }
        }

        /* ── SCROLLBAR HIDE on mobile ── */
        @media (max-width: 767px) {
            .profile-tabs-row::-webkit-scrollbar,
            .tab-row-scroll::-webkit-scrollbar { display: none; }
            .profile-tabs-row, .tab-row-scroll { scrollbar-width: none; -ms-overflow-style: none; }

            /* Profile dropdown — fixed to top-right on mobile, never overlaps content */
            #profile-menu {
                position: fixed !important;
                top: 52px !important;
                right: 10px !important;
                left: auto !important;
                max-width: calc(100vw - 20px);
                min-width: 180px;
                z-index: 9999 !important;
            }
        }

        /* ── TAP FEEDBACK ── */
        .tap { transition: transform .08s ease; }
        .tap:active { transform: scale(.97); }
    </style>
</head>

    <script>
        // --- DATA LAYER: EXAM QUESTION BANK ---
        const examQuestionBank = [
            { id: "q1", module: "Day 1", type: "mcq", question: "What does 'narrow AI' refer to?", options: ["AI that is not very smart", "AI highly specialized to do specific tasks", "AI that has general human intelligence", "AI that can only process numbers"], correct: 1, explanation: "Current AI is 'narrow' because it is highly specialized for specific tasks, unlike human 'general' intelligence." },
            { id: "q2", module: "Day 1", type: "short", question: "In the premium prompt formula (CTFT), what does the 'C' stand for?", acceptedKeywords: ["context"], explanation: "CTFT stands for Context, Task, Format, and Tone." },
            { id: "q3", module: "Day 1", type: "mcq", question: "If you train an AI using thousands of emails already marked as 'Spam' or 'Not Spam', what kind of learning is this?", options: ["Unsupervised Learning", "Reinforcement Learning", "Supervised Learning", "Deep Learning"], correct: 2, explanation: "Because the data is explicitly labeled, it is a classic example of Supervised Learning." },
            { id: "q4", module: "Day 1", type: "scenario", question: "You need to parse a 50-page highly logical document and want the most human-sounding written summary. Which tool is best?", options: ["ChatGPT", "Gemini", "Claude", "Midjourney"], correct: 2, explanation: "Claude is widely considered the best writer, sounding the most human and highly logical for parsing long documents." },
            { id: "q5", module: "Day 2", type: "mcq", question: "Which tool is best used to connect AI automatically with other apps like Gmail and Google Sheets?", options: ["ChatGPT", "Zapier", "Canva Magic Studio", "Midjourney"], correct: 1, explanation: "Zapier is a no-code automation platform that connects thousands of apps to trigger AI workflows." },
            { id: "q6", module: "Day 2", type: "scenario", question: "You want to create quick, beautiful graphics for a social media post using AI. What tool is recommended?", options: ["RunwayML", "Zapier", "Canva Magic Studio", "Claude"], correct: 2, explanation: "Canva Magic Studio is built specifically for easily generating graphics and designs for content." },
            { id: "q7", module: "Day 2", type: "short", question: "What is the term for connecting AI to apps so tasks happen without manual input?", acceptedKeywords: ["automation", "no-code", "no code", "zapier"], explanation: "No-Code Automation allows you to delegate busywork so things happen automatically." },
            { id: "q8", module: "Day 3", type: "mcq", question: "What does it mean when an AI 'hallucinates'?", options: ["It crashes the computer", "It invents facts that are not true", "It becomes self-aware", "It refuses to answer a prompt"], correct: 1, explanation: "Hallucinations occur when an AI confidently presents invented or false information as fact." },
            { id: "q9", module: "Day 3", type: "short", question: "What phrase should you add to a prompt to make the AI process complex logic better? (Hint: 'think ____')", acceptedKeywords: ["step-by-step", "step by step", "chain of thought"], explanation: "Asking the AI to 'think step-by-step' triggers Chain of Thought reasoning, improving logic." },
            { id: "q10", module: "Day 3", type: "mcq", question: "When doing AI freelancing, what is the recommended ratio of AI work to Human touch?", options: ["50% AI / 50% Human", "100% AI / 0% Human", "80% AI / 20% Human", "20% AI / 80% Human"], correct: 2, explanation: "Use AI to do 80% of the heavy lifting, then add your human touch for the final 20%." },
            { id: "q11", module: "Day 3", type: "mcq", question: "The Golden Rule of using AI for factual or mathematical data is:", options: ["Trust it completely", "Trust but verify", "Only use ChatGPT for math", "Never use AI for numbers"], correct: 1, explanation: "Large Language Models predict text, they don't do math natively. You must always double-check." },
            { id: "q12", module: "Day 4", type: "mcq", question: "Which tool is described as the 'best all-rounder'?", options: ["Claude", "Perplexity", "ChatGPT", "Gemini"], correct: 2, explanation: "ChatGPT is currently considered the best all-rounder for everyday tasks." },
            { id: "q13", module: "Day 4", type: "short", question: "Which AI tool acts as a direct replacement for traditional search engines?", acceptedKeywords: ["perplexity"], explanation: "Perplexity is a conversational search engine that cites real-time sources." },
            { id: "q14", module: "Day 4", type: "mcq", question: "According to the 15-Min Daily AI Routine, what should you do in the morning?", options: ["Summarize long emails", "Draft replies for tomorrow", "Generate social media images", "Prioritize tasks using the Eisenhower Matrix"], correct: 3, explanation: "The morning routine involves feeding Gemini your tasks to prioritize them using the Eisenhower Matrix." },

        // --- DATA LAYER: ORIGINAL COURSE CONTENT ---
        const courseData = [
            {

        // --- STATE MANAGEMENT ---
        let state = {
            view: 'overview',
            activeLesson: null,
            progress: {},
            quizScores: {},
            expandedModules: ['m1'],
            enrolled: false,       // true only after verified Razorpay payment
            enrolledAt: null,
            paymentId: null
        };

        let examState = {
            questions: [],
            currentIdx: 0,
            userAnswers: {},
            timeRemaining: 1800, // 30 minutes
            timerInterval: null
        };

        // ── State persistence (localStorage) ─────────────────────────────────
        // Firebase cloud sync is bolted on at the bottom after DOMContentLoaded

        function init() {
            try {
                const uid = sessionStorage.getItem('ci_uid') || '';
                const key = uid ? 'cbkCourseState_' + uid : 'cbkCourseState';
                const saved = localStorage.getItem(key);
                if (saved) {
                    const parsed = JSON.parse(saved);
                    state = { ...state, ...parsed, expandedModules: parsed.expandedModules || ['m1'] };
                    if (Object.keys(state.progress).length > 0 && state.view === 'overview') {
                        state.view = 'dashboard';
                    }
                }
            } catch (e) { console.warn('localStorage read failed', e); }

            renderSidebar();
            navigate(state.view, state.activeLesson, false);
            updateNavProgress();

            document.addEventListener('click', (e) => {
                ['profile-menu'].forEach(id => {
                    const menu = document.getElementById(id);
                    const btn = menu ? menu.previousElementSibling : null;
                    if (menu && !menu.classList.contains('hidden') && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
                        menu.classList.add('hidden');
                    }
                });
            });
        }

        function saveState() {
            try {
                const uid = sessionStorage.getItem('ci_uid') || '';
                const key = uid ? 'cbkCourseState_' + uid : 'cbkCourseState';
                localStorage.setItem(key, JSON.stringify(state));
            } catch (e) { console.warn('localStorage write failed', e); }
            // Cloud sync via window._cloudSave set by Firebase module below
            if (window._cloudSave) window._cloudSave(state);
            updateNavProgress();
            renderSidebar();
        }

        function resetData() {
            if (confirm("Are you sure you want to reset all your progress? This cannot be undone.")) {
                try {
                    const uid = sessionStorage.getItem('ci_uid') || '';
                    const key = uid ? 'cbkCourseState_' + uid : 'cbkCourseState';
                    localStorage.removeItem(key);
                } catch(_) {}
                if (window._cloudReset) window._cloudReset();
                showToast('Progress has been reset.', 'info');
                setTimeout(() => location.reload(), 800);
            }
        }

        function getOverallProgress() {
            let total = 0, completed = 0;
            courseData.forEach(m => m.lessons.forEach(l => { total++; if (state.progress[l.id]) completed++; }));
            return total === 0 ? 0 : Math.round((completed / total) * 100);
        }

        function getModuleProgress(moduleId) {
            const module = courseData.find(m => m.id === moduleId);
            let total = module.lessons.length, completed = 0;
            module.lessons.forEach(l => { if (state.progress[l.id]) completed++; });
            return { total, completed, percent: Math.round((completed / total) * 100) };
        }

        function getNextLesson() {
            for (let m of courseData) {
                for (let l of m.lessons) {
                    if (!state.progress[l.id]) return l;
                }
            }
            return null;
        }

        function toggleMobileMenu(e) {
            if(e) e.stopPropagation();
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            sidebar.classList.toggle('-translate-x-full');
            overlay.classList.toggle('hidden');
        }

        function toggleDropdown(id) {
            const el = document.getElementById(id);
            if(el) el.classList.toggle('hidden');
        }

        function toggleAccordion(moduleId) {
            if (state.expandedModules.includes(moduleId)) {
                state.expandedModules = state.expandedModules.filter(id => id !== moduleId);
            } else {
                state.expandedModules.push(moduleId);
            }
            saveState();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active', 'animate-fade-in'));
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('text-gray-900', 'font-bold', 'border-gray-900');
                btn.classList.add('text-gray-500', 'font-medium', 'border-transparent');
            });
            const activeContent = document.getElementById(tabId);
            if(activeContent) activeContent.classList.add('active', 'animate-fade-in');
            const activeBtn = document.getElementById('btn-' + tabId);
            if(activeBtn) {
                activeBtn.classList.remove('text-gray-500', 'font-medium', 'border-transparent');
                activeBtn.classList.add('text-gray-900', 'font-bold', 'border-gray-900');
            }
        }

        // Dedicated Profile Tab Switcher - CSS visibility handled exclusively by .active class now to prevent Tailwind clash
        function switchProfileTab(tabId) {
            document.querySelectorAll('.profile-tab-content').forEach(el => {
                el.classList.remove('active', 'animate-fade-in');
            });
            document.querySelectorAll('.profile-tab-btn').forEach(btn => {
                btn.classList.remove('text-gray-900', 'border-gray-900', 'font-bold');
                btn.classList.add('text-gray-500', 'border-transparent', 'font-medium');
            });
            const activeContent = document.getElementById(tabId);
            if(activeContent) {
                activeContent.classList.add('active', 'animate-fade-in');
            }
            const activeBtn = document.getElementById('btn-' + tabId);
            if(activeBtn) {
                activeBtn.classList.remove('text-gray-500', 'border-transparent', 'font-medium');
                activeBtn.classList.add('text-gray-900', 'border-gray-900', 'font-bold');
            }
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const colors = { success: 'bg-green-50 text-green-800 border-green-200', error: 'bg-red-50 text-red-800 border-red-200', info: 'bg-gray-100 text-gray-900 border-gray-300' };
            const icons = {
                success: '<svg class="w-5 h-5 mr-2 text-green-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>',
                error: '<svg class="w-5 h-5 mr-2 text-red-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>',
                info: '<svg class="w-5 h-5 mr-2 text-gray-600" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"></path></svg>'
            };
            toast.className = `flex items-center p-4 border rounded-xl shadow-lg pointer-events-auto animate-slide-in-right ${colors[type]}`;
            toast.innerHTML = `${icons[type]} <span class="text-sm font-semibold">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add('toast-exit'); setTimeout(() => toast.remove(), 300); }, 3000);
        }

        function navigate(view, payload = null, animate = true) {
            // ── PAYWALL GATE: block course access until enrolled ───────────────
            if (!state.enrolled && (view === 'dashboard' || view === 'lesson')) {
                view = 'overview';
                payload = null;
                showToast('Enroll to unlock the full course.', 'info');
            }

            if (view !== 'lesson' || (payload !== 'm4l2' && examState.timerInterval)) {
                clearInterval(examState.timerInterval);
                document.getElementById('global-timer-display').classList.add('hide');
            }

            state.view = view;
            state.activeLesson = (view === 'lesson') ? payload : null;
            saveState();
            
            const container = document.getElementById('app-container');
            const sidebar = document.getElementById('sidebar');
            if (sidebar && !sidebar.classList.contains('-translate-x-full') && window.innerWidth < 768) {
                toggleMobileMenu();
            }

            container.innerHTML = ''; 
            
            let html = '';
            if (view === 'overview') html = buildOverview();
            else if (view === 'dashboard') html = buildDashboard();
            else if (view === 'lesson') {
                let isExam = false;
                for(let m of courseData) {
                    let l = m.lessons.find(x => x.id === payload);
                    if(l && l.type === 'exam') isExam = true;
                }
                html = isExam ? buildExam() : buildLesson(payload);
            }
            else if (view === 'profile') html = buildProfile();
            
            container.innerHTML = html;
            
            if (animate) container.firstElementChild.classList.add('animate-fade-in');
            
            document.querySelectorAll('#sidebar-nav button.nav-btn').forEach(btn => btn.classList.remove('bg-gray-100', 'text-gray-900', 'font-semibold'));
            if(view === 'dashboard') { const dashBtn = document.getElementById('nav-dash'); if(dashBtn) dashBtn.classList.add('bg-gray-100', 'text-gray-900', 'font-semibold'); }
            else if (view === 'overview') { const navOver = document.getElementById('nav-overview'); if(navOver) navOver.classList.add('bg-gray-100', 'text-gray-900', 'font-semibold'); }

            if (view === 'lesson' && payload) {
                for (let m of courseData) {
                    if (m.lessons.some(l => l.id === payload)) {
                        if (!state.expandedModules.includes(m.id)) { state.expandedModules.push(m.id); saveState(); }
                        break;
                    }
                }

                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 hover:shadow-md hover:border-gray-300 transition-all cursor-pointer group flex flex-col float-box" onclick="navigate('lesson', '${m.lessons[0].id}')">
                        <div class="flex justify-between items-start mb-4">
                            <div class="w-12 h-12 rounded-xl bg-gray-100 border border-gray-200 flex items-center justify-center text-gray-900 font-bold text-xl group-hover:bg-gray-900 group-hover:text-white transition-colors">${i+1}</div>
                            <span class="text-sm font-bold ${prog.percent === 100 ? 'text-green-600 bg-green-50' : 'text-gray-700 bg-gray-100'} px-3 py-1 rounded-full">${prog.percent}% Done</span>
                        </div>
                        <h4 class="text-xl font-bold text-gray-900 mb-2 group-hover:text-gray-900 transition-colors">${m.title}</h4>
                        <p class="text-sm text-gray-500 line-clamp-2 mb-6 flex-1">${m.description}</p>
                        <div class="w-full bg-gray-100 rounded-full h-2 shadow-inner"><div class="bg-gray-900 h-2 rounded-full transition-all duration-1000" style="width: ${prog.percent}%"></div></div>
                    </div>`;
            });
            modulesHtml += `</div>`;

            const wName = (window._currentDisplayName || "there").split(" ")[0]; return `<div class="max-w-5xl mx-auto w-full pb-10"><header class="mb-6 md:mb-10"><h1 class="text-2xl md:text-4xl font-extrabold text-gray-900 tracking-tight dash-h1">Welcome back, ${wName} 👋</h1></header>${resumeCard}<div class="mt-12"><h2 class="text-2xl font-bold text-gray-900 mb-6 border-b border-gray-200 pb-2">Your Learning Path</h2>${modulesHtml}</div></div>`;
        }

        // --- EXAM SYSTEM LOGIC & UI ---
        function shuffleArray(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function generateNewExam() {
            let shuffled = shuffleArray(examQuestionBank);
            examState.questions = shuffled.map(q => {
                if(q.options) {
                    const originalCorrectText = q.options[q.correct];
                    const shuffledOptions = shuffleArray(q.options);
                    const newCorrectIdx = shuffledOptions.indexOf(originalCorrectText);
                    return { ...q, options: shuffledOptions, correct: newCorrectIdx };
                }
                return q;
            });
            examState.currentIdx = 0;
            examState.userAnswers = {};
            examState.timeRemaining = 1800;
            document.getElementById('result-screen').classList.add('hide');
            startExamUI();
        }

        function startExamUI() {
            if(examState.questions.length === 0) {
                examState.questions = [...examQuestionBank];
            }
            examState.currentIdx = 0;
            examState.userAnswers = {};
            examState.timeRemaining = 1800;
            
            document.getElementById('start-screen').classList.add('hide');
            document.getElementById('exam-screen').classList.remove('hide');
            document.getElementById('global-timer-display').classList.remove('hide');
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            clearInterval(examState.timerInterval);
            const timeDisplay = document.getElementById('global-time-left');
            
            examState.timerInterval = setInterval(() => {
                examState.timeRemaining--;
                const m = Math.floor(examState.timeRemaining / 60).toString().padStart(2, '0');
                const s = (examState.timeRemaining % 60).toString().padStart(2, '0');
                timeDisplay.textContent = `${m}:${s}`;
                
                if (examState.timeRemaining <= 300) timeDisplay.parentElement.classList.replace('bg-gray-100', 'bg-red-50');
                if (examState.timeRemaining <= 0) {
                    clearInterval(examState.timerInterval);
                    submitExam();
                }
            }, 1000);
        }

        window.saveExamAnswer = function(val) {
            examState.userAnswers[examState.currentIdx] = val;
        }

        window.nextExamQuestion = function() {
            if (examState.currentIdx < examState.questions.length - 1) {
                examState.currentIdx++;
                renderQuestion();
            } else {
                if(confirm("Are you sure you want to submit your exam?")) submitExam();
            }
        }

        window.prevExamQuestion = function() {
            if (examState.currentIdx > 0) {
                examState.currentIdx--;
                renderQuestion();
            }
        }

        function autoGrade(q, userAnswer) {
            if (q.options) return userAnswer === q.correct;
            if (!userAnswer || typeof userAnswer !== 'string') return false;
            const normalized = userAnswer.toLowerCase().trim();
            return q.acceptedKeywords.some(kw => normalized.includes(kw));
        }

        function submitExam() {
            clearInterval(examState.timerInterval);
            document.getElementById('global-timer-display').classList.add('hide');
            document.getElementById('exam-screen').classList.add('hide');
            
            let score = 0;
            let reviewHtml = '';

            examState.questions.forEach((q, idx) => {
                const ans = examState.userAnswers[idx];
                const isCorrect = autoGrade(q, ans);
                if (isCorrect) score++;

                let userText = q.options ? (ans !== undefined ? q.options[ans] : "Not answered") : (ans || "Not answered");
                let correctText = q.options ? q.options[q.correct] : `Keywords: ${q.acceptedKeywords.join(', ')}`;
                
                reviewHtml += `
                    <div class="bg-white border ${isCorrect ? 'border-green-200' : 'border-red-200'} rounded-xl p-5 mb-4 shadow-sm">
                        <div class="flex items-start gap-3">
                            <div class="${isCorrect ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'} w-8 h-8 rounded-full flex items-center justify-center font-bold shrink-0 mt-0.5">
                                ${isCorrect ? '✓' : '✗'}
                            </div>
                            <div class="flex-1">
                                <h4 class="font-bold text-gray-900 mb-2">${idx + 1}. ${q.question}</h4>
                                <div class="text-sm space-y-1 mb-3">
                                    <p class="${isCorrect ? 'text-green-700 font-medium' : 'text-red-600'}">Your Answer: ${userText}</p>
                                    ${!isCorrect ? `<p class="text-green-700 font-medium">Correct Answer: ${correctText}</p>` : ''}
                                </div>
                                <div class="bg-gray-50 text-gray-600 text-sm p-3 rounded-lg border border-gray-100">
                                    <strong class="text-gray-800">Explanation:</strong> ${q.explanation}
                                </div>
                            </div>
                        </div>
                    </div>`;
            });

            const pct = Math.round((score / examState.questions.length) * 100);
            const passed = pct >= 80;

            const header = document.getElementById('result-header');
            if (passed) {
                header.className = "p-8 md:p-12 text-center text-white bg-gradient-to-br from-green-500 to-emerald-700";
                document.getElementById('result-title').textContent = "Congratulations! 🎉";
                document.getElementById('result-subtitle').textContent = "You passed the Final Exam.";
                state.progress['m4l2'] = true;
                saveState();
                showToast("Certificate Unlocked!", "success");
            } else {
                header.className = "p-8 md:p-12 text-center text-white bg-gradient-to-br from-gray-800 to-gray-900";
                document.getElementById('result-title').textContent = "Almost there.";
                document.getElementById('result-subtitle').textContent = "You need 80% to pass. Review your mistakes and try again.";
            }

            document.getElementById('final-score').textContent = `${pct}%`;
            document.getElementById('review-container').innerHTML = reviewHtml;
            document.getElementById('result-screen').classList.remove('hide');
        }

        function renderQuestion() {
            const q = examState.questions[examState.currentIdx];
            const pct = Math.round(((examState.currentIdx + 1) / examState.questions.length) * 100);
            
            document.getElementById('question-counter').textContent = `Question ${examState.currentIdx + 1} of ${examState.questions.length}`;
            document.getElementById('exam-progress-percent').textContent = `${pct}%`;
            document.getElementById('exam-progress-bar').style.width = `${pct}%`;
            document.getElementById('q-module').textContent = q.module;
            document.getElementById('q-type').textContent = q.type === 'short' ? 'Short Answer' : (q.type === 'scenario' ? 'Multiple Choice' : 'Multiple Choice');
            document.getElementById('question-text').textContent = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            if (q.options) {
                q.options.forEach((opt, idx) => {
                    const isChecked = examState.userAnswers[examState.currentIdx] === idx ? 'checked' : '';
                    container.innerHTML += `
                        <label class="block relative cursor-pointer group">
                            <input type="radio" name="q${examState.currentIdx}" value="${idx}" class="option-radio sr-only" onchange="window.saveExamAnswer(${idx})" ${isChecked}>
                            <div class="p-4 md:p-5 border-2 border-gray-200 rounded-xl transition-all group-hover:border-gray-400 flex items-center bg-white">
                                <div class="w-5 h-5 rounded-full border-2 border-gray-300 mr-4 flex items-center justify-center shrink-0"><div class="radio-inner w-2.5 h-2.5 rounded-full transition-colors"></div></div>
                                <span class="text-gray-800 text-lg">${opt}</span>
                            </div>
                        </label>`;
                });
            } else {
                const savedText = examState.userAnswers[examState.currentIdx] || '';
                container.innerHTML = `<textarea rows="3" class="w-full p-4 border-2 border-gray-200 rounded-xl focus:border-gray-900 focus:ring-0 text-lg transition-colors outline-none resize-none" placeholder="Type your answer here..." oninput="window.saveExamAnswer(this.value)">${savedText}</textarea>`;
            }

            document.getElementById('btn-prev').disabled = examState.currentIdx === 0;
            const nextBtn = document.getElementById('btn-next');
            if (examState.currentIdx === examState.questions.length - 1) {
                nextBtn.textContent = "Submit Exam";
                nextBtn.classList.replace('bg-gray-900', 'bg-green-600');
                nextBtn.classList.replace('hover:bg-gray-800', 'hover:bg-green-700');
            } else {
                nextBtn.innerHTML = "Next Question &rarr;";
                nextBtn.classList.replace('bg-green-600', 'bg-gray-900');
                nextBtn.classList.replace('hover:bg-green-700', 'hover:bg-gray-800');
            }
        }

        // --- EXAM VIEW BUILDER ---
        function buildExam() {
            if(examState.questions.length === 0) examState.questions = [...examQuestionBank];

            return `
            <div class="max-w-4xl mx-auto w-full animate-fade-in pb-10">

                    <div class="w-20 h-20 bg-gray-900 rounded-2xl flex items-center justify-center text-white text-3xl shadow-lg mx-auto mb-6 transform rotate-3">🎓</div>

                    <p class="text-gray-500 mb-8 text-lg">Test your knowledge across all modules. You must score at least 80% to graduate and unlock your certificate.</p>

                            <li class="flex"><svg class="w-5 h-5 text-gray-400 mr-3 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 30 Minutes Time Limit</li>
                        </ul>
                    </div>
                    <button onclick="startExamUI()" class="bg-gray-900 hover:bg-gray-800 text-white font-bold py-4 px-10 rounded-xl shadow-lg shadow-gray-900/20 transition-transform transform hover:-translate-y-0.5 text-lg w-full sm:w-auto">
                        ${state.progress['m4l2'] ? 'Retake Exam' : 'Start Exam Now'}

                </div>

                <div id="exam-screen" class="hide animate-fade-in">
                    <div class="mb-8">

                    </div>

                    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 md:p-10 mb-6">
                        <div class="flex items-center gap-3 mb-6">
                            <span id="q-module" class="bg-gray-100 text-gray-600 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest">Module</span>
                            <span id="q-type" class="text-xs font-medium text-gray-400 border border-gray-200 px-2 py-1 rounded">Type</span>
                        </div>
                        <h2 id="question-text" class="text-2xl md:text-3xl font-extrabold text-gray-900 mb-8 leading-snug tracking-tight">Question?</h2>

                    </div>

                    <div class="flex items-center justify-between">
                        <button id="btn-prev" onclick="window.prevExamQuestion()" class="px-6 py-3 border border-gray-300 rounded-xl text-gray-700 font-bold hover:bg-gray-50 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">&larr; Previous</button>
                        <button id="btn-next" onclick="window.nextExamQuestion()" class="bg-gray-900 hover:bg-gray-800 text-white px-8 py-3 rounded-xl font-bold shadow-md transition-transform transform hover:-translate-y-0.5">Next Question &rarr;</button>
                    </div>

                <div id="result-screen" class="hide animate-fade-in">

                        <div class="p-6 md:p-10 border-b border-gray-200 flex flex-col sm:flex-row justify-center gap-4">

                                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> Shuffle & Retake
                            </button>
                            <button onclick="navigate('dashboard')" class="bg-gray-900 hover:bg-gray-800 text-white font-bold py-3 px-6 rounded-xl transition-colors">Return to Dashboard</button>

                    </div>
                </div>

        }

        // --- STANDARD LESSON BUILDER ---
        function buildLesson(lessonId) {
            let currentModule, currentLesson, nextId = null, prevId = null;
            let found = false;

            for (let i = 0; i < courseData.length; i++) {
                for (let j = 0; j < courseData[i].lessons.length; j++) {
                    if (courseData[i].lessons[j].id === lessonId) {
                        currentModule = courseData[i]; currentLesson = courseData[i].lessons[j]; found = true;
                        if (j > 0) prevId = courseData[i].lessons[j-1].id;
                        else if (i > 0) prevId = courseData[i-1].lessons[courseData[i-1].lessons.length-1].id;
                        if (j < courseData[i].lessons.length - 1) nextId = courseData[i].lessons[j+1].id;
                        else if (i < courseData.length - 1) nextId = courseData[i+1].lessons[0].id;
                        break;
                    }
                }
                if (found) break;
            }

            if (!currentLesson) return `<div class="p-8 text-center"><h2 class="text-2xl font-bold text-gray-900">Lesson not found.</h2><button onclick="navigate('dashboard')" class="mt-4 text-gray-900 underline">Return to Dashboard</button></div>`;

            const isCompleted = state.progress[lessonId];
            let contentHtml = '';

            if (currentLesson.type === 'read' || currentLesson.type === 'video') {
                contentHtml = `
                    <div class="prose max-w-none prose-gray prose-lg text-gray-700">${currentLesson.content}</div>
                    <div class="mt-12 pt-6 border-t border-gray-200 flex flex-col sm:flex-row items-center justify-between gap-4">
                        <div class="text-sm text-gray-500 font-medium">${isCompleted ? 'You have completed this lesson.' : 'Mark complete to track your progress.'}</div>
                        <button onclick="markCompleted('${lessonId}', '${nextId}')" class="${isCompleted ? 'bg-green-600 hover:bg-green-700 text-white shadow-green-500/30' : 'bg-gray-900 hover:bg-gray-800 text-white shadow-gray-900/20'} w-full sm:w-auto font-bold py-3 px-8 rounded-xl shadow-lg transition-all transform hover:-translate-y-0.5 flex items-center justify-center">
                            ${isCompleted ? `<svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Completed &bull; Continue` : `Mark as Complete`}
                        </button>
                    </div>`;
            } else if (currentLesson.type === 'quiz') {
                const q = currentLesson.quiz;
                const answered = state.quizScores[lessonId] !== undefined;
                const passed = state.quizScores[lessonId] === 100;
                
                let optionsHtml = q.options.map((opt, idx) => `
                    <label class="flex items-center p-5 border-2 rounded-xl cursor-pointer transition-all mb-4 ${answered ? (idx === q.correct ? 'bg-green-50 border-green-400 shadow-sm' : 'bg-gray-50 border-gray-200 opacity-50') : 'hover:bg-gray-50 border-gray-200 hover:border-gray-400'}">
                        <input type="radio" name="quiz-${lessonId}" value="${idx}" class="w-5 h-5 text-gray-900 bg-gray-100 border-gray-300 focus:ring-gray-900 focus:ring-2" ${answered ? 'disabled' : ''} ${answered && idx === q.correct ? 'checked' : ''}>
                        <span class="ml-4 text-base font-medium ${answered && idx === q.correct ? 'text-green-900' : 'text-gray-900'}">${opt}</span>
                    </label>`).join('');

                contentHtml = `
                    <div class="bg-white p-6 md:p-10 rounded-2xl shadow-sm border border-gray-200">
                        <div class="mb-6 flex items-center"><span class="bg-gray-100 text-gray-800 text-xs font-bold px-3 py-1 rounded-full uppercase tracking-wider flex items-center"><svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> Knowledge Check</span></div>
                        <h3 class="text-2xl font-bold text-gray-900 mb-8 leading-snug">${q.question}</h3>
                        <form id="quiz-form-${lessonId}">${optionsHtml}</form>
                        ${answered ? `
                            <div class="mt-8 p-5 rounded-xl border-2 ${passed ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'} animate-fade-in">
                                <div class="flex items-center mb-2">
                                    ${passed ? '<svg class="w-6 h-6 text-green-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>' : '<svg class="w-6 h-6 text-red-600 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>'}
                                    <h4 class="font-bold text-lg ${passed ? 'text-green-900' : 'text-red-900'}">${passed ? 'Correct! Outstanding work.' : 'Not quite right.'}</h4>
                                </div>
                                <p class="text-sm font-medium ${passed ? 'text-green-800' : 'text-red-800'} ml-8 leading-relaxed">${q.explanation}</p>
                            </div>
                            <div class="mt-8 flex flex-col sm:flex-row justify-end gap-4 border-t border-gray-100 pt-6">
                                ${!passed ? `<button onclick="resetQuiz('${lessonId}')" class="w-full sm:w-auto bg-white border-2 border-gray-300 hover:bg-gray-50 text-gray-800 py-3 px-6 rounded-xl font-bold transition-colors">Try Again</button>` : ''}
                                ${passed && nextId ? `<button onclick="navigate('lesson', '${nextId}')" class="w-full sm:w-auto bg-gray-900 hover:bg-gray-800 text-white py-3 px-8 rounded-xl font-bold shadow-lg shadow-gray-900/20 transition-all transform hover:-translate-y-0.5">Continue to Next Lesson</button>` : ''}
                                ${passed && !nextId ? `<button onclick="navigate('dashboard')" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white py-3 px-8 rounded-xl font-bold shadow-lg shadow-green-500/30 transition-all transform hover:-translate-y-0.5">Return to Dashboard</button>` : ''}
                            </div>
                        ` : `<div class="mt-10 flex justify-end border-t border-gray-100 pt-6"><button onclick="submitQuiz('${lessonId}', ${q.correct}, '${nextId}')" class="w-full sm:w-auto bg-gray-900 hover:bg-gray-800 text-white font-bold py-3 px-8 rounded-xl shadow-md transition-all transform hover:-translate-y-0.5">Submit Answer</button></div>`}
                    </div>`;
            }

            return `
                <div class="max-w-6xl mx-auto flex flex-col xl:flex-row gap-6 w-full pb-10 lesson-2col">
                    <div class="flex-1 min-w-0">
                        <div class="mb-8 border-b border-gray-200 pb-6">
                            <div class="text-sm text-gray-900 font-bold mb-3 uppercase tracking-wider flex items-center">${currentModule.title}</div>
                            <h1 class="text-3xl md:text-4xl font-extrabold text-gray-900 tracking-tight">${currentLesson.title}</h1>
                        </div>
                        ${contentHtml}
                        <div class="flex justify-between items-center mt-12 pt-6 text-sm font-bold">
                            ${prevId ? `<button onclick="navigate('lesson', '${prevId}')" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors flex items-center"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> Previous</button>` : `<div></div>`}
                            ${nextId ? `<button onclick="navigate('lesson', '${nextId}')" class="px-4 py-2 border border-gray-300 rounded-lg text-gray-600 hover:bg-gray-50 hover:text-gray-900 transition-colors flex items-center">Next <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg></button>` : `<div></div>`}
                        </div>

                `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=111827&color=fff&rounded=true&size=128`;
            const avatarUrlSm = user.photoURL ||
                `https://ui-avatars.com/api/?name=${encodeURIComponent(displayName)}&background=111827&color=fff&rounded=true&size=64`;

            // Store globally so buildProfile() and welcome message can read it live
            window._currentDisplayName = displayName;
            window._currentAvatarUrl   = avatarUrl;

            // 1. Header dropdown name
            const dropdownName = document.getElementById('dropdown-username');
            if (dropdownName) dropdownName.textContent = displayName.toUpperCase();

            // 2. Header small avatar
            const headerAvatar = document.getElementById('header-avatar');
            if (headerAvatar) headerAvatar.src = avatarUrlSm;

            // 3. Profile banner big avatar
            const bannerAvatar = document.getElementById('profile-banner-avatar');
            if (bannerAvatar) bannerAvatar.src = avatarUrl;

            // 4. Profile banner name
            const bannerName = document.getElementById('profile-banner-name');
            if (bannerName) bannerName.textContent = displayName.toUpperCase();

            // 5. Referral link — use first name + last 2 chars of uid
            const refInput = document.getElementById('referral-link-input');
            if (refInput) {
                const handle = (firstName + user.uid.slice(-2)).toUpperCase();
                refInput.value = `https://cbkminds.com/ref/${handle}`;
            }

            // 6. If profile page is already rendered (before auth resolved),
            //    re-render it now so name/avatar are correct on mobile
            if (state.view === 'profile') {
                navigate('profile', null, false);
            }

            // Inject Sign Out into dropdown (only once)
            const profileMenu = document.getElementById('profile-menu');
            if (profileMenu && !document.getElementById('signout-btn')) {
                const sep = document.createElement('div');
                sep.className = 'border-t border-gray-100 my-1';
                profileMenu.appendChild(sep);
                const btn = document.createElement('button');
                btn.id = 'signout-btn';
                btn.className = 'w-full text-left px-4 py-2 text-sm text-red-500 hover:bg-red-50 transition-colors font-medium';
                btn.textContent = 'Sign Out';
                btn.onclick = async () => {
                    if (window._firebaseSignOut) await window._firebaseSignOut();
                    window.location.href = 'index.html';
                };
                profileMenu.appendChild(btn);
            }

            // Silently load cloud progress — only re-render if it has MORE progress
            try {
                const cloudData = await loadProgressFromCloud(user.uid);
                if (cloudData && cloudData.progress) {
                    const localCount = Object.keys(state.progress || {}).length;
                    const cloudCount = Object.keys(cloudData.progress).length;
                    if (cloudCount > localCount) {
                        state = { ...state, ...cloudData, expandedModules: cloudData.expandedModules || ['m1'] };
                        if (Object.keys(state.progress).length > 0 && state.view === 'overview') {
                            state.view = 'dashboard';
                        }
                        renderSidebar();
                        navigate(state.view, state.activeLesson, false);
                        updateNavProgress();
                    }
                }
            } catch (_) { /* cloud unavailable — localStorage render is fine */ }
        });
    </script>

    <!-- ── Razorpay SDK ──────────────────────────────────────────────────── -->
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

    <!-- ── Payment Module (ESM — imports Firebase) ───────────────────────── -->
    <script type="module">
        import {
            onAuthChange,
            saveProgressToCloud,
            loadProgressFromCloud,
            db
        } from './firebase-config.js';

        import {
            doc, setDoc, getDoc, serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // ── Razorpay Key (publishable — safe to expose) ──────────────────────
        // ▼▼▼ REPLACE WITH YOUR ACTUAL RAZORPAY KEY_ID ▼▼▼
        const RAZORPAY_KEY_ID = 'rzp_live_XXXXXXXXXXXXXXXX';
        const COURSE_AMOUNT   = 9900;   // ₹99 in paise
        const COURSE_NAME     = 'AI Fast-Track — CI Minds';

        // ── Write verified enrollment to Firestore ───────────────────────────
        // Security model:
        //   1. Razorpay payment happens client-side (user pays)
        //   2. We write payment_id + order_id + signature to Firestore
        //      under users/{uid}/payments/{payment_id}
        //   3. Firestore Security Rules prevent users from writing
        //      enrolled:true themselves — only the payment doc triggers it
        //   4. A Cloud Function (optional, recommended for production)
        //      verifies the HMAC signature and sets enrolled:true
        //   5. Client-side: we trust the payment if Razorpay calls
        //      handler (only fires on genuine success) — safe for ₹99
        async function recordPaymentAndUnlock(uid, paymentData) {
            try {
                // Write raw payment record first
                const payRef = doc(db, 'users', uid, 'payments', paymentData.razorpay_payment_id);
                await setDoc(payRef, {
                    razorpay_payment_id: paymentData.razorpay_payment_id,
                    razorpay_order_id:   paymentData.razorpay_order_id   || '',
                    razorpay_signature:  paymentData.razorpay_signature  || '',
                    amount:              COURSE_AMOUNT,
                    currency:            'INR',
                    course:              'ai-fast-track',
                    paidAt:              serverTimestamp(),
                    uid:                 uid
                });

                // Update user doc with enrollment status
                await setDoc(doc(db, 'users', uid), {
                    enrolled:    true,
                    enrolledAt:  serverTimestamp(),
                    paymentId:   paymentData.razorpay_payment_id
                }, { merge: true });

                return true;
            } catch (err) {
                console.error('[CI Minds] Payment record failed:', err);
                return false;
            }
        }

        // ── Load enrollment status on auth resolve ───────────────────────────
        // The main dashboard module already calls init() on DOMContentLoaded.
        // This module patches in the enrollment status after Firebase resolves.
        onAuthChange(async (user) => {
            if (!user) return; // main module handles redirect

            // Check Firestore for enrollment status
            try {
                const snap = await getDoc(doc(db, 'users', user.uid));
                if (snap.exists() && snap.data().enrolled === true) {
                    state.enrolled   = true;
                    state.enrolledAt = snap.data().enrolledAt || null;
                    state.paymentId  = snap.data().paymentId  || null;
                    // Re-render current view so CTA updates
                    if (state.view === 'overview') navigate('overview', null, false);
                    renderSidebar();
                }
            } catch (err) {
                console.warn('[CI Minds] Enrollment check failed:', err);
            }

            // ── initiatePayment — called by Enroll Now button ─────────────────
            window.initiatePayment = function() {
                const btn = document.getElementById('enroll-btn');
                if (btn) { btn.textContent = 'Opening checkout…'; btn.disabled = true; }

                const options = {
                    key:         RAZORPAY_KEY_ID,
                    amount:      COURSE_AMOUNT,
                    currency:    'INR',
                    name:        'CI Minds',
                    description: COURSE_NAME,
                    image:       'https://ui-avatars.com/api/?name=CI&background=111827&color=fff&size=80&font-size=0.5&bold=true',
                    prefill: {
                        name:  user.displayName || '',
                        email: user.email        || '',
                    },
                    theme: { color: '#111827' },
                    modal: {
                        ondismiss: function() {
                            // Reset button if user closes without paying
                            if (btn) {
                                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg> Enroll Now — ₹99`;
                                btn.disabled = false;
                            }
                        }
                    },
                    handler: async function(response) {
                        // ── Payment success ──────────────────────────────────
                        // response.razorpay_payment_id is present only on genuine success
                        if (!response.razorpay_payment_id) {
                            showToast('Payment could not be verified. Please contact support.', 'error');
                            return;
                        }

                        if (btn) { btn.textContent = 'Verifying payment…'; }

                        const saved = await recordPaymentAndUnlock(user.uid, response);

                        if (saved) {
                            // Update local state
                            state.enrolled  = true;
                            state.paymentId = response.razorpay_payment_id;
                            saveState();

                            // Celebrate and unlock UI
                            showToast('🎉 Enrolled! Your course is now unlocked.', 'success');
                            setTimeout(() => {
                                renderSidebar();
                                navigate('dashboard', null, true);
                            }, 800);
                        } else {
                            showToast('Payment received but verification failed. Contact support@cbkminds.com', 'error');
                            if (btn) { btn.disabled = false; btn.innerHTML = 'Enroll Now — ₹99'; }
                        }
                    }
                };

                try {
                    const rzp = new Razorpay(options);
                    rzp.on('payment.failed', function(resp) {
                        showToast('Payment failed: ' + (resp.error.description || 'Unknown error'), 'error');
                        if (btn) { btn.disabled = false; btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg> Enroll Now — ₹99`; }
                    });
                    rzp.open();
                } catch (err) {
                    console.error('[CI Minds] Razorpay init failed:', err);
                    showToast('Payment gateway failed to load. Check your connection.', 'error');
                    if (btn) { btn.disabled = false; btn.innerHTML = 'Enroll Now — ₹99'; }
                }
            };
        });
    </script>
